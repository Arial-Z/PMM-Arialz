templates:
  AudioLanguage:
    optional:
      - builder_level
    default:
      overlay: <<overlay_name>>
      horizontal_offset: 260
      horizontal_align: left
      vertical_offset: 15
      vertical_align: top
    builder_level: <<builder_level>>
    overlay:
      name: <<overlay_name>>
      url: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/overlays/img/audio/<<overlay>>.png
      group: audio_language
      weight: <<weight>>
      back_color: "#000000B3"
      back_radius: 30
      back_width: 230
      back_height: 120
      horizontal_offset: <<horizontal_offset>>
      horizontal_align: <<horizontal_align>>
      vertical_offset: <<vertical_offset>>
      vertical_align: <<vertical_align>>

overlays:

  Audio-VO:
    template:
      - name: AudioLanguage
        weight: 10
    plex_all: true
    filters:
      filepath.regex.not: '(?<=\[)[^]]*?\b(?:FR)\b[^]]*?(?=\])'
        
  Audio-VF:
    template:
      - name: AudioLanguage
        weight: 20
    plex_all: true
    filters:
      filepath.regex: '(?<=\[)[^]]*?\b(?:FR)\b[^]]*?(?=\])'
      
  Audio-Multi:
    template:
      - name: AudioLanguage
        weight: 30
    plex_all: true
    filters:
        audio_language: '(?<=\[)[^]]*?\b(?:FR\+|\+FR)\b[^]]*?(?=\])'
