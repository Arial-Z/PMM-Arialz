templates:
  IMDB_Logo:                                                               #IDMB Rating Logo
    overlay:
      name: <<overlay_name>>
      url: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/overlays/img/rating/<<overlay_name>>.png
      back_color: "#00000099"
      back_radius: 30
      back_width: 240
      back_height: 120
      horizontal_offset: 15
      horizontal_align: left
      vertical_offset: 30
      vertical_align: bottom

  Text_Rating:                                                               #Critic Rating Text (IMDB Rating)
    overlay:
      name: text(<<rimdb_rating>>)
      font: fonts/Roboto-Bold.ttf
      font_size: 70
      font_color: "#FFFFFF"
      horizontal_offset: 144
      horizontal_align: left
      vertical_offset: 64
      vertical_align: bottom

overlays:
  IMDB_Logo:
    template: [name: IMDB_Rating]
    plex_all: true

  Text_Rating:
    template: [name: Critic_Rating]
    plex_all: true
